<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign Up</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #1e7f3f, #6bcf8b);
        min-height: 100vh;
    }

    nav {
        background: rgba(0, 0, 0, 0.8);
    }

    .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
    }

    #top {
        width: 520px;
        padding: 30px;
        margin: 60px auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        color: white;
    }

    h3 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: bold;
    }

    label {
        margin-top: 15px;
        font-weight: 600;
    }

    input[type="radio"] {
        margin-right: 5px;
        margin-left: 10px;
    }

    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border-radius: 8px;
        border: none;
    }

    button {
        width: 100%;
        margin-top: 20px;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: #ffffff;
        color: #1e7f3f;
        font-weight: bold;
        transition: 0.3s ease;
    }

    button:hover {
        background: #1e7f3f;
        color: white;
        transform: scale(1.05);
    }

    #output {
        margin-top: 20px;
        text-align: center;
    }

    #output-text {
        font-weight: bold;
        font-size: 18px;
    }

    #output img {
        width: 90px;
        margin-top: 10px;
    }
</style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="font-weight: bold;">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-graduation-cap"></i> INTRAMURALS SY25-26</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="page2.html">Sign up</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">Team Checker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="page3.html">Players</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="container" id="top">
    <h3>SW#2 Third Quarter</h3>

    <label>Have you registered online?</label>
    <input type="radio" name="reg" value="yes"> Yes
    <input type="radio" name="reg" value="no"> No

    <label>Do you have medical clearance?</label>
    <input type="radio" name="med" value="yes"> Yes
    <input type="radio" name="med" value="no"> No

    <label>Grade:</label>
    <select id="grade">
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
    </select><br>

    <label>Section:</label>
    <select id="section">
        <option value="sapphire">Sapphire</option>
        <option value="ruby">Ruby</option>
        <option value="emerald">Emerald</option>
        <option value="topaz">Topaz</option>
    </select>

    <button py-click="check">Check Eligibility</button>

    <div id="output">
        <p id="output-text"></p>
        <img id="output-img" src="">
    </div>
</div>

<py-script src="main.py"></py-script>

</body>
</html>
