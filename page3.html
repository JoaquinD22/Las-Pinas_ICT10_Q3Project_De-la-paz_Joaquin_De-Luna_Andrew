<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Players</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://pyscript.net/releases/2024.3.1/core.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script type="module" src="https://pyscript.net/releases/2024.3.1/core.js"></script>
<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #14532d, #22c55e);
        min-height: 100vh;
    }

    nav {
        background: rgba(0, 0, 0, 0.85);
    }

    .navbar-brand {
        font-weight: bold;
        letter-spacing: 1px;
    }

    #top {
        width: 500px;
        padding: 30px;
        margin: 60px auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
        color: white;
    }

    h3 {
        text-align: center;
        margin-bottom: 25px;
        font-weight: bold;
    }

    button {
        width: 100%;
        padding: 10px;
        border-radius: 10px;
        border: none;
        background: white;
        color: #14532d;
        font-weight: bold;
        transition: 0.3s ease;
    }

    button:hover {
        background: #14532d;
        color: white;
        transform: scale(1.05);
    }

    #output {
        margin-top: 25px;
        max-height: 400px;
        overflow-y: auto;
        padding: 15px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 12px;
    }

    #output-list {
        font-weight: 500;
        line-height: 1.6;
    }
</style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark" style="font-weight: bold;">
        <div class="container">
            <a class="navbar-brand" href="index.html"><i class="fa-solid fa-graduation-cap"></i> INTRAMURALS SY25-26</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="page2.html">Sign up</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Team Checker</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="page3.html">Players</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

<div class="container" id="top">
    <h3>Intramural Players:</h3>


    <button py-click="show_players">Show Players</button>

    <div id="output">
        <p id="output-list"></p>
    </div>
</div>

<py-script src="main.py"></py-script>

</body>
</html>
